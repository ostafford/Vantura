# Files in the config/locales directory are used for internationalization and
# are automatically loaded by Rails. If you want to use locales other than
# English, add the necessary files in this directory.
#
# To use the locales, use `I18n.t`:
#
#     I18n.t "hello"
#
# In views, this is aliased to just `t`:
#
#     <%= t("hello") %>
#
# To use a different locale, set it with `I18n.locale`:
#
#     I18n.locale = :es
#
# This would use the information in config/locales/es.yml.
#
# To learn more about the API, please read the Rails Internationalization guide
# at https://guides.rubyonrails.org/i18n.html.
#
# Be aware that YAML interprets the following case-insensitive strings as
# booleans: `true`, `false`, `on`, `off`, `yes`, `no`. Therefore, these strings
# must be quoted to be interpreted as strings. For example:
#
#     en:
#       "yes": yup
#       enabled: "ON"

en:
  # Flash messages
  flash:
    # Authorization
    not_authorized: "You are not authorized to perform this action."
    
    # Projects
    projects:
      created: "Project created successfully."
      updated: "Project updated successfully."
      deleted: "Project deleted successfully."
    
    # Project Expenses
    project_expenses:
      created: "Project expense created successfully."
      updated: "Project expense updated successfully."
      deleted: "Project expense deleted successfully."
    
    # Expense Contributions
    expense_contributions:
      marked_paid: "Contribution marked as paid."
      mark_paid_failed: "Failed to mark contribution as paid."
    
    # Transactions
    transactions:
      updated: "Transaction updated successfully."
    
    # Goals
    goals:
      created: "Goal created successfully"
      updated: "Goal updated successfully"
      deleted: "Goal deleted successfully"
    
    # Planned Transactions
    planned_transactions:
      created: "Planned transaction created successfully."
      updated: "Planned transaction updated successfully."
      deleted: "Planned transaction deleted successfully."
    
    # Settings
    settings:
      updated: "Settings updated successfully"
    
    # Onboarding
    onboarding:
      token_blank: "Token cannot be blank"
      token_invalid_format: "Invalid token format. Please check and try again."
      token_invalid: "Invalid token. Please check and try again."
      connection_failed: "Unable to connect. Please try again later."
      skip_connection: "You can connect your Up Bank account later in Settings."
    
    # Dashboard
    dashboard:
      sync_started: "Sync started"
    
    # Feedback
    feedback:
      submitted: "Thank you for your feedback!"
      failed: "Failed to submit feedback"
